name: PHP Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  php-quality:
    name: PHP Lint, Analyse and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, zip, curl
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Lint (PHPCS)
        run: composer lint
      - name: Analyse (PHPStan)
        run: composer analyse
      - name: Test (PHPUnit)
        run: composer test
