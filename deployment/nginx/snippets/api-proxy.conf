# API Proxy Configuration
# Proxies requests to the Node.js backend (Express.js)
# Include this in location blocks with: include snippets/api-proxy.conf;

# Proxy to upstream backend (defined in main config as backend_api)
proxy_pass http://backend_api;

# Use HTTP/1.1 for proxy connection (required for keepalive)
proxy_http_version 1.1;

# WebSocket support - upgrade connection when requested
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';

# Forward client information to backend
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Timeout configuration (matches backend timeout settings)
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# Cache bypass for WebSocket upgrade and cookies
proxy_cache_bypass $http_upgrade;

# Disable buffering for real-time responses
proxy_buffering off;
proxy_request_buffering off;
