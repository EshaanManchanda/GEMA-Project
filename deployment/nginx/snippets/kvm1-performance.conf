# KVM1 VPS Performance Optimizations
# Tailored for single-core server with limited resources
# Include this in the http {} block of nginx.conf

# =====================================================================
# WORKER PROCESS OPTIMIZATION
# =====================================================================

# Single core = 1 worker process is optimal
# worker_processes auto; will detect this, but being explicit
# Note: Set in main nginx.conf, not in snippets

# =====================================================================
# OPEN FILE CACHE (Reduces Disk I/O)
# =====================================================================

# Cache file descriptors for static assets
# Significantly reduces disk I/O for frequently accessed files
open_file_cache max=10000 inactive=60s;
open_file_cache_valid 90s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

# =====================================================================
# TCP OPTIMIZATIONS
# =====================================================================

# Send headers in one packet (reduces syscalls)
tcp_nopush on;

# Don't buffer data-sends (disable Nagle's algorithm)
# Improves response time for small responses
tcp_nodelay on;

# =====================================================================
# BUFFER TUNING (KVM1 Optimized)
# =====================================================================

# Client request buffers (conservative for single-core)
client_body_buffer_size 16K;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;

# Output buffers (optimized for KVM1)
output_buffers 2 32k;
postpone_output 1460;

# =====================================================================
# SENDFILE & OPTIMIZATIONS
# =====================================================================

# Use kernel sendfile() for better performance
sendfile on;

# Reset timed-out connections immediately
reset_timedout_connection on;

# =====================================================================
# KEEPALIVE OPTIMIZATION
# =====================================================================

# Client keepalive (reduce TCP handshakes)
keepalive_timeout 30s;
keepalive_requests 100;

# =====================================================================
# BROTLI COMPRESSION (If Available)
# =====================================================================
# Note: Requires ngx_brotli module. Check with: nginx -V | grep brotli
# If not available, comment out or skip

# brotli on;
# brotli_comp_level 5;  # 1-11, balanced for KVM1 single-core
# brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
# brotli_static on;      # Serve pre-compressed .br files if they exist
# brotli_min_length 1024;

# =====================================================================
# PROXY CACHE ZONE (For API Responses)
# =====================================================================

# Cache zone for API responses
# 10MB cache = ~80,000 cached responses (1-2 days of traffic on KVM1)
proxy_cache_path /var/cache/nginx/api_cache
    levels=1:2
    keys_zone=api_cache:10m
    max_size=50m
    inactive=60m
    use_temp_path=off;

# Cache zone for static API data (categories, collections)
# These change infrequently, can have longer cache
proxy_cache_path /var/cache/nginx/static_api_cache
    levels=1:2
    keys_zone=static_api_cache:5m
    max_size=20m
    inactive=1h
    use_temp_path=off;

# =====================================================================
# PROXY BUFFER SETTINGS (For Cached Endpoints)
# =====================================================================

# Default proxy buffers (used by cached endpoints)
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;

# =====================================================================
# LOGGING OPTIMIZATION
# =====================================================================

# Reduce disk writes by buffering logs
access_log buffer=32k flush=30s;
