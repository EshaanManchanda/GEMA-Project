# SSL/TLS Configuration Parameters
# Optimized for security and performance
# Include this in server blocks with: include snippets/ssl-params.conf;

# SSL Protocols - TLS 1.2 and 1.3 only (no SSL or TLS 1.0/1.1)
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher Suite - High security ciphers only
ssl_ciphers HIGH:!aNULL:!MD5;

# Prefer server ciphers (security)
ssl_prefer_server_ciphers on;

# SSL Session Cache - shared across workers for better performance
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# OCSP Stapling - improves SSL/TLS handshake performance
# DISABLED: Let's Encrypt certificates lack OCSP responder URL
# ssl_stapling on;
# ssl_stapling_verify on;

# DNS Resolver for OCSP stapling
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;
