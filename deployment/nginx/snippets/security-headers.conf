# Security Headers Configuration
# Adds HTTP security headers to responses
# Include this in server blocks with: include snippets/security-headers.conf;

# X-Frame-Options - prevents clickjacking attacks
add_header X-Frame-Options "SAMEORIGIN" always;

# X-Content-Type-Options - prevents MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection - enables browser XSS filter (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy - controls referrer information sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Strict-Transport-Security (HSTS) - forces HTTPS for 1 year
# includeSubDomains: applies to all subdomains (api.kidrove.com, etc.)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
