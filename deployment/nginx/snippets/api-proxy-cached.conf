# API Proxy Configuration with Caching
# Use for cacheable API endpoints (categories, collections, static data)
# Include this in location blocks for endpoints that support caching
#
# Prerequisites:
# - Backend must send Cache-Control headers (we added this in Phase 5)
# - Proxy cache zones must be defined (see kvm1-performance.conf)

# Proxy to upstream backend
proxy_pass http://backend_api;

# Use HTTP/1.1 for proxy connection (required for keepalive)
proxy_http_version 1.1;

# WebSocket support - upgrade connection when requested
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection 'upgrade';

# Forward client information to backend
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# Timeout configuration
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# =====================================================================
# CACHING CONFIGURATION
# =====================================================================

# Enable caching for this endpoint
proxy_cache static_api_cache;

# Cache key (includes query parameters for proper invalidation)
proxy_cache_key "$scheme$request_method$host$request_uri";

# Cache successful responses (200, 301, 302) for 5 minutes
proxy_cache_valid 200 301 302 5m;

# Cache 404 responses for 1 minute (prevent repeated lookups)
proxy_cache_valid 404 1m;

# Honor Cache-Control headers from backend
# This respects the cache-control headers we added in backend controllers
proxy_cache_revalidate on;

# Serve stale content if backend is down (up to 1 hour old)
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

# Allow background updates while serving stale
proxy_cache_background_update on;

# Lock requests to prevent cache stampede (multiple requests for same uncached resource)
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;

# Bypass cache for specific conditions
proxy_cache_bypass $http_cache_control;  # If client sends Cache-Control: no-cache
proxy_no_cache $http_pragma;             # If client sends Pragma: no-cache

# Add cache status header (for debugging)
add_header X-Cache-Status $upstream_cache_status always;

# Enable buffering for cached responses (required for caching)
proxy_buffering on;
proxy_request_buffering on;

# Buffer settings
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;
