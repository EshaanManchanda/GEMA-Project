# Loads the brotli dynamic modules, built from google/ngx_brotli against the
# installed nginx version with --with-compat (module isn't packaged for this
# host's apt repos).
#
# The relative "modules/..." path below resolves against this nginx build's
# configured modules directory, which on this (Debian-packaged) nginx is
# /usr/share/nginx/modules/ — NOT /etc/nginx/modules/. Copy the compiled
# .so files there:
#   sudo cp objs/ngx_http_brotli_filter_module.so /usr/share/nginx/modules/
#   sudo cp objs/ngx_http_brotli_static_module.so /usr/share/nginx/modules/
#
# Deploy: copy this file to /etc/nginx/modules-enabled/70-mod-http-brotli.conf
# on the server (main nginx.conf already includes that directory — no other
# edits needed). Run `nginx -t` after copying, before reloading.
#
# To disable brotli later: just delete this file from modules-enabled/ and
# remove the `brotli`/`brotli_static` directives from kidrove.conf — no
# nginx.conf changes required either way.
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
