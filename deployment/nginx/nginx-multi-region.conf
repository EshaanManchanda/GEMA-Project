# Nginx Configuration for Kidrove Multi-Region Support
# Domains: kidrove.com, kidrove.in, kidrove.ae
# Backend Port: 5000 (localhost)
# Frontend: Static build served from /var/www/GEMA-Project/frontend/dist
# API Subdomains: api.kidrove.com, api.kidrove.in, api.kidrove.ae
#
# Server Blocks: 12 total (4 per domain)
# - HTTP Frontend (redirect to HTTPS)
# - HTTPS Frontend (serves React SPA)
# - HTTP API (redirect to HTTPS)
# - HTTPS API (proxies to Node.js backend)

# =====================================================================
# UPSTREAM BACKEND CONFIGURATION
# =====================================================================

upstream backend_api {
    server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
    keepalive 16;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# =====================================================================
# BOT DETECTION FOR SEO OPTIMIZATION
# =====================================================================

# Bot detection map - compiled once at nginx start for performance
map $http_user_agent $is_bot {
    default 0;
    ~*(googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot|facebookexternalbot|linkedinbot|twitterbot|whatsapp|slackbot|telegrambot|discordbot|semrushbot|ahrefsbot|mj12bot|dotbot|rogerbot|screaming\ frog|crawler|spider|bot) 1;
}

# =====================================================================
# RATE LIMITING ZONES
# =====================================================================

# General API rate limiting (10 requests/second per IP)
limit_req_zone $binary_remote_addr zone=kidrove_api_limit:10m rate=10r/s;

# General traffic rate limiting (30 requests/second per IP)
limit_req_zone $binary_remote_addr zone=kidrove_general_limit:10m rate=30r/s;

# Connection limiting (max 10 concurrent connections per IP)
limit_conn_zone $binary_remote_addr zone=kidrove_conn_limit:10m;

# =====================================================================
# KIDROVE.COM - FRONTEND
# =====================================================================

# HTTP → HTTPS redirect for kidrove.com and www.kidrove.com
server {
    listen 80;
    listen [::]:80;
    server_name kidrove.com www.kidrove.com;

    # Allow Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS redirect www to non-www for canonical URL (SEO fix for duplicate content)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.kidrove.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/kidrove.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidrove.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kidrove.com/chain.pem;

    # SSL configuration
    include snippets/ssl-params.conf;

    # 301 permanent redirect to non-www
    return 301 https://kidrove.com$request_uri;
}

# HTTPS Frontend for kidrove.com (canonical URL)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kidrove.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/kidrove.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidrove.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kidrove.com/chain.pem;

    # SSL configuration
    include snippets/ssl-params.conf;

    # Security headers
    include snippets/security-headers.conf;

    # SEO headers for all HTML responses
    add_header X-Robots-Tag "index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" always;
    add_header Link "<https://kidrove.com$request_uri>; rel=\"canonical\"" always;

    # Connection limiting
    limit_conn kidrove_conn_limit 10;

    # Document root
    root /var/www/GEMA-Project/frontend/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Client upload limits
    client_max_body_size 50M;
    client_body_timeout 120s;
    client_header_timeout 120s;

    # Static assets (long-term cache)
    location /assets/ {
        limit_req zone=kidrove_general_limit burst=50 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Images (30-day cache)
    location /images/ {
        limit_req zone=kidrove_general_limit burst=50 nodelay;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Static files (1-year cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker (no cache) - Disable for bots to ensure fresh HTML
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;

        # Disable service worker for search engine bots
        if ($is_bot) {
            add_header Service-Worker-Allowed "none" always;
            add_header Clear-Site-Data "\"cache\", \"storage\"" always;
        }

        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    # Favicon
    location = /favicon.ico {
        expires 7d;
        access_log off;
        log_not_found off;
    }

    # Dynamic SEO Files (sitemap.xml, robots.txt) - Proxy to Backend
    location ~ ^/(sitemap.*\.xml|robots\.txt)$ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Don't cache these heavily in Nginx, let backend control verify
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # React Router SPA fallback (must be last)
    location / {
        limit_req zone=kidrove_general_limit burst=50 nodelay;
        try_files $uri $uri/ /index.html;

        # HTML files - no cache (aggressive SEO strategy)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

            # Extra headers for bots to ensure absolutely fresh content
            if ($is_bot) {
                add_header Pragma "no-cache" always;
                add_header Expires "0" always;
            }
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ ^/(\.env|\.git|node_modules|package\.json|package-lock\.json) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/kidrove-com-access.log;
    error_log /var/log/nginx/kidrove-com-error.log warn;
}

