# GEMA Event Management Platform - NGINX Configuration
# Optimized for Hostinger KVM1 VPS
#
# Installation Instructions:
# 1. Copy this file to: /etc/nginx/sites-available/gema
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/gema /etc/nginx/sites-enabled/
# 3. Test configuration: sudo nginx -t
# 4. Reload NGINX: sudo systemctl reload nginx
# 5. Setup SSL: sudo certbot --nginx -d your-domain.com

# Redirect HTTP to HTTPS (after SSL is configured)
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # SSL Configuration (Certbot will manage these)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Content Security Policy (adjust as needed for your app)
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://res.cloudinary.com wss:; frame-src https://js.stripe.com;" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Client upload size limit (for file uploads via Cloudinary)
    client_max_body_size 50M;

    # Request buffering
    client_body_buffer_size 1m;  # 1MB buffer (increased from 128k for large uploads)

    # Access and Error Logs
    access_log /var/log/nginx/gema_access.log;
    error_log /var/log/nginx/gema_error.log warn;

    # Root directory for React frontend
    root /var/www/gema/frontend/dist;
    index index.html;

    # Backend API Proxy
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;

        # WebSocket support for real-time features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward client information
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts (adjust based on your longest API operation)
        proxy_connect_timeout 180s;  # Match max backend timeout
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;     # Allows 500MB uploads with slow connections

        # Buffering
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffers 16 16k;              # 256KB total buffer
        proxy_buffer_size 16k;             # Initial buffer for headers
    }

    # Health Check Endpoint
    location /health {
        proxy_pass http://localhost:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static Assets Caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker (should not be cached)
    location ~* (service-worker\.js|sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Manifest and robots
    location ~* \.(manifest|webmanifest|json|xml|txt)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # React Router (SPA) - Serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Deny access to hidden files (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(git|env|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Optional: Separate server block for www to non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.your-domain.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    return 301 https://your-domain.com$request_uri;
}
